name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore HopDev.Maui.Controls.sln

      - name: Build
        run: dotnet build HopDev.Maui.Controls.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack src/HopDev.Maui.Controls/HopDev.Maui.Controls.csproj -c Release --no-build --output artifacts/packages

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages/*.nupkg
          retention-days: 30
