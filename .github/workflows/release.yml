name: Release to NuGet

on:
  push:
    tags: [ 'v*' ]     # Trigger on tags like v1.0.0, v1.1.0-preview.1

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Publishing version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore HopDev.Maui.Controls.sln

      - name: Build
        run: dotnet build src/HopDev.Maui.Controls/HopDev.Maui.Controls.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack
        run: dotnet pack src/HopDev.Maui.Controls/HopDev.Maui.Controls.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} --output artifacts/packages

      - name: Push to NuGet.org
        run: dotnet nuget push artifacts/packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/packages/*.nupkg
