name: Release to NuGet

on:
  push:
    tags: [ 'v*' ]     # Trigger on tags like v1.0.0, v1.1.0-preview.1

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Publishing version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore src/HopDev.Maui.Controls/HopDev.Maui.Controls.csproj

      - name: Build & Pack
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "artifacts" "packages"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          dotnet pack src/HopDev.Maui.Controls/HopDev.Maui.Controls.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --output $outDir
          Write-Host "=== Pack output directory ==="
          Get-ChildItem $outDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== All .nupkg files in workspace ==="
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter *.nupkg | ForEach-Object { Write-Host $_.FullName }

      - name: Push to NuGet.org
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "HopDev.Maui.Controls.*.nupkg"
          if ($packages.Count -eq 0) {
            Write-Error "No .nupkg files found!"
            exit 1
          }
          foreach ($pkg in $packages) {
            Write-Host "Pushing: $($pkg.FullName)"
            dotnet nuget push $pkg.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "**/*.nupkg"
